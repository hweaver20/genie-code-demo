resources:
  jobs:
    model_training:
      name: model_training

      schedule:
        quartz_cron_expression: "0 0 6 1 * ?"
        timezone_id: America/New_York
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - haley.weaver@databricks.com

      tags:
        project: churn-prediction
        team: data-science

      tasks:
        - task_key: train_churn_model
          notebook_task:
            notebook_path: /Users/haley.weaver@databricks.com/media-datamart/churn_prediction_model
            source: WORKSPACE
          max_retries: 1
          min_retry_interval_millis: 120000
          timeout_seconds: 3600
